<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Badge Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="github-banner">
  <span class="banner-left">Built by <span>OstinUA</span></span>
  <a class="github-link" href="https://github.com/readme-SVG/site-preview" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577
        0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755
        -1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998
        .108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22
        -.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006
        2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23
        1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015
        3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </svg>
    <span>/</span><span class="gh-username">site-preview</span>
  </a>
</div>

<div class="page">
  <header>
    <div class="logo">
      <span class="logo-text">WEB_BADGE</span>
    </div>
    <h1>Website Badge<br/>Generator</h1>
    <p class="subtitle">Paste any website URL to generate a dynamic SVG preview board.</p>
  </header>

  <div class="card">
    <div class="input-group">
      <label>Website URL</label>
      <input type="text" id="url-input" placeholder="https://example.com" />
    </div>

    <div class="input-group">
      <label>Custom Title (optional)</label>
      <input type="text" id="custom-title-input" placeholder="Leave empty to use website title" />
    </div>

    <div class="options-grid">
      <div class="input-group">
        <label>Width (px)</label>
        <input type="number" id="width-input" value="320" min="200" max="1000" />
      </div>
      <div class="input-group">
        <label>Height (px, 0 = auto)</label>
        <input type="number" id="height-input" value="0" min="0" max="1000" />
      </div>
      <div class="input-group">
        <label>Image Scale: <span id="scale-val">1.00</span>x</label>
        <input type="range" id="scale-input" value="1.0" min="0.1" max="3.0" step="0.1" />
      </div>
      <div class="input-group">
        <label>Image X Offset: <span id="offset-x-val">0</span>px</label>
        <input type="range" id="offset-x-input" value="0" min="-400" max="400" step="5" />
      </div>
      <div class="input-group">
        <label>Border Radius</label>
        <input type="number" id="radius-input" value="0" min="0" max="30" />
      </div>
      <div class="input-group">
        <label>Border Width (px)</label>
        <input type="number" id="border-width-input" value="2" min="0" max="10" />
      </div>
      <div class="input-group">
        <label>Background Color</label>
        <div class="color-row">
          <input type="color" id="bg-color-picker" value="#0d1117" />
          <input type="text" id="bg-color-text" value="#0d1117" />
        </div>
      </div>
      <div class="input-group">
        <label>Border Color</label>
        <div class="color-row">
          <input type="color" id="border-color-picker" value="#ffffff" />
          <input type="text" id="border-color-text" value="#ffffff" />
        </div>
      </div>
      <div class="input-group">
        <label>Title Color</label>
        <div class="color-row">
          <input type="color" id="title-color-picker" value="#ffffff" />
          <input type="text" id="title-color-text" value="#ffffff" />
        </div>
      </div>
      <div class="input-group">
        <label>Title Plate Color</label>
        <div class="color-row">
          <input type="color" id="plate-color-picker" value="#0f1117" />
          <input type="text" id="plate-color-text" value="#0f1117" />
        </div>
      </div>
      <div class="input-group">
        <label>Text Opacity: <span id="title-opacity-val">1.00</span></label>
        <input type="range" id="title-opacity-input" value="1" min="0" max="1" step="0.05" />
      </div>
      <div class="input-group">
        <label>Plate Opacity: <span id="plate-opacity-val">0.80</span></label>
        <input type="range" id="plate-opacity-input" value="0.80" min="0" max="1" step="0.05" />
      </div>
      <div class="input-group" style="grid-column: 1 / -1;">
        <label>Title Position</label>
        <select id="title-position-input">
          <option value="outside_top">Very Top (above preview)</option>
          <option value="overlay_top">Top (overlay)</option>
          <option value="overlay_bottom" selected>Bottom (overlay)</option>
          <option value="outside_bottom">Very Bottom (below preview)</option>
        </select>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="generate" id="gen-btn" onclick="generate()">
      GENERATE BOARD
    </button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Processing layout...</div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-section">
      <h3>Output Preview</h3>
      <p class="preview-notice">If image shows placeholder, please wait a few seconds. It will auto-refresh.</p>
      <div class="preview-wrap">
        <a id="preview-link" href="#" target="_blank" rel="noopener">
          <img id="preview-img" src="" alt="Website card preview" style="max-width:100%" />
        </a>
      </div>
    </div>

    <div class="result-section">
      <h3>Integration Code</h3>
      <div class="tabs">
        <button class="tab active" onclick="setTab('markdown', this)">Markdown</button>
        <button class="tab" onclick="setTab('html', this)">HTML</button>
        <button class="tab" onclick="setTab('url', this)">URL</button>
      </div>
      <div class="code-block">
        <pre id="code-output"></pre>
        <button class="copy-btn" id="copy-btn" onclick="copyCode()">Copy</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
